<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="cmux-diff-viewer.css">
</head>
<body>
  <div id="root"></div>
  <script>
    window.cmuxDiffState = {
      currentPayload: null,
      renderToken: 0,
      collapsedPaths: {},
    };

    window.cmuxReportError = function(type, error) {
      try {
        const message = error && error.message ? error.message : String(error);
        window.webkit?.messageHandlers?.cmuxDiffPerf?.postMessage({
          type,
          mode: "selected-file",
          totalFiles: 0,
          visibleFiles: 0,
          durationMs: 0,
          message,
        });
      } catch (_) {
      }
    };

    window.addEventListener("error", function(event) {
      window.cmuxReportError("page-error", event.error || event.message || "unknown error");
    });

    window.addEventListener("unhandledrejection", function(event) {
      window.cmuxReportError("page-rejection", event.reason || "unhandled rejection");
    });

    window.cmuxReceiveDiffPayload = function(payload) {
      window.cmuxDiffState.currentPayload = payload;
      if (window.cmuxDiffRender) {
        window.cmuxDiffRender(payload);
      }
    };

    window.cmuxApplyTheme = function(isDarkMode) {
      if (!window.cmuxDiffState.currentPayload) {
        return;
      }
      const nextPayload = {
        ...window.cmuxDiffState.currentPayload,
        isDarkMode,
      };
      window.cmuxDiffState.currentPayload = nextPayload;
      if (window.cmuxDiffRender) {
        window.cmuxDiffRender(nextPayload);
      }
    };
  </script>
  <script src="cmux-diff-viewer.js"></script>
</body>
</html>
